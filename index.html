<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Disney Parks Queue Oracle</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Nunito:wght@400;500;600;700&display=swap');

:root {
  --gold: #f5c842;
  --gold-light: #ffe98a;
  --gold-dim: rgba(245,200,66,0.18);
  --bg0: #050b18;
  --bg1: #0b1628;
  --bg2: #111e38;
  --purple: #7c5cbf;
  --purple-light: #a882e8;
  --teal: #3dd6c0;
  --coral: #ff7f6e;
  --glass: rgba(255,255,255,0.06);
  --glass-border: rgba(255,255,255,0.13);
  --text: #ddd6f8;
  --text-dim: rgba(200,190,240,0.55);
}

*{box-sizing:border-box;margin:0;padding:0;}

body {
  font-family:'Nunito',sans-serif;
  background: radial-gradient(ellipse at 25% 0%, #1e1648 0%, #0c1428 50%),
              radial-gradient(ellipse at 78% 100%, #122038 0%, #090f20 55%);
  background-color: #0c1428;
  height:100vh;
  overflow:hidden;
  color:var(--text);
}

#fw-canvas {
  position:fixed;top:0;left:0;width:100%;height:100%;
  pointer-events:none;z-index:0;
}

.wrap {
  position:relative;z-index:1;
  max-width:1100px;margin:0 auto;
  padding:1rem 3.5rem 1rem;
  display:flex;flex-direction:column;
  height:100vh;
  gap:0.8rem;
}

/* HEADER */
.header {text-align:center;flex-shrink:0;}

.castle {
  display:inline-block;
  font-size:1.9rem;
  filter:drop-shadow(0 0 18px rgba(245,200,66,0.75));
  animation:levitate 5s ease-in-out infinite;
  margin-bottom:0.1rem;
}
@keyframes levitate{0%,100%{transform:translateY(0) rotate(-1deg);}50%{transform:translateY(-7px) rotate(1deg);}}

h1.title {
  font-family:'Cinzel',serif;
  font-weight:700;
  font-size:clamp(1.2rem,3vw,1.9rem);
  letter-spacing:0.04em;
  line-height:1.15;
  background:linear-gradient(120deg,#e8a020 0%,#f5c842 35%,#ffe98a 60%,#f5c842 80%,#c07818 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  margin-bottom:0.2rem;
}
.subtitle {
  font-size:0.75rem;
  color:var(--text-dim);
  letter-spacing:0.12em;
  text-transform:uppercase;
  font-weight:600;
}
.attrib {
  margin-top:0.2rem;
  font-size:0.7rem;
  color:rgba(180,170,220,0.4);
}
.attrib a{color:rgba(245,200,66,0.6);text-decoration:none;}
.attrib a:hover{color:var(--gold);}

/* MAP */
.map-wrap {
  flex:1;
  min-height:0;
  margin-bottom:0;
  background:var(--glass);
  border:1px solid var(--glass-border);
  border-radius:18px;
  padding:0.6rem 1rem 0.5rem;
  position:relative;
  overflow:visible;
  display:flex;
  flex-direction:column;
}
.map-wrap::before {
  content:'';position:absolute;inset:0;border-radius:18px;
  background:radial-gradient(ellipse at 25% 60%,rgba(107,79,160,0.1) 0%,transparent 65%),
             radial-gradient(ellipse at 75% 30%,rgba(26,58,110,0.12) 0%,transparent 65%);
  pointer-events:none;
}
.map-cap {
  font-size:0.68rem;color:var(--text-dim);
  text-transform:uppercase;letter-spacing:0.12em;
  text-align:center;margin-bottom:0.5rem;font-weight:700;
}
#map-svg{width:100%;flex:1;min-height:0;display:block;overflow:visible;}

/* Park dots */
.park-pin {cursor:default;}
.park-pin .halo {transition:r 0.25s,opacity 0.25s;}
.park-pin .core {transition:r 0.2s;}
.park-pin:hover .halo {r:11;opacity:0.5;}
.park-pin:hover .core {r:6;}

/* Tooltip */
.tip {
  position:absolute;
  background:rgba(6,12,28,0.95);
  border:1px solid rgba(245,200,66,0.38);
  border-radius:11px;padding:8px 13px;
  font-size:0.77rem;line-height:1.45;
  color:#f0eaff;
  pointer-events:none;opacity:0;
  transition:opacity 0.18s;
  white-space:nowrap;
  backdrop-filter:blur(12px);
  z-index:100;
  transform:translateY(-6px);
}
.tip.show{opacity:1;transform:translateY(0);}
.tip strong{color:var(--gold);display:block;font-size:0.82rem;margin-bottom:1px;}
.tip em{color:rgba(180,170,230,0.55);font-style:normal;font-size:0.71rem;}

/* QUICK PILLS */
.quick-wrap {
  margin-bottom:1.3rem;
  transition:opacity 0.45s ease, max-height 0.5s ease, margin 0.5s ease;
  max-height:200px;overflow:hidden;
}
.quick-wrap.gone {
  opacity:0;max-height:0;margin-bottom:0;pointer-events:none;
}
.quick-label {
  font-size:0.68rem;color:var(--text-dim);
  text-transform:uppercase;letter-spacing:0.12em;
  text-align:center;margin-bottom:0.7rem;font-weight:700;
}
.pills {
  display:flex;flex-wrap:wrap;gap:0.65rem;justify-content:center;
}

/* Colourful pills — always visible */
.pill {
  display:flex;align-items:center;gap:0.45rem;
  padding:0.55rem 1.1rem;
  border-radius:999px;
  font-size:0.84rem;font-weight:600;
  cursor:pointer;
  border:1.5px solid;
  font-family:'Nunito',sans-serif;
  transition:transform 0.18s,box-shadow 0.18s,filter 0.18s;
  backdrop-filter:blur(10px);
  line-height:1.3;
}
.pill:hover{transform:translateY(-2px);filter:brightness(1.15);box-shadow:0 6px 24px rgba(0,0,0,0.35);}
.pill:active{transform:translateY(0);}

.pill-a {
  background:rgba(99,180,255,0.18);
  border-color:rgba(99,180,255,0.5);
  color:#a8d8ff;
}
.pill-b {
  background:rgba(80,220,170,0.16);
  border-color:rgba(80,220,170,0.48);
  color:#7ef8d8;
}
.pill-c {
  background:rgba(255,150,100,0.16);
  border-color:rgba(255,150,100,0.45);
  color:#ffbba0;
}

/* CHAT */
.chat-box {
  flex:none;
  height:38vh;
  display:flex;flex-direction:column;
  background:var(--glass);
  border:1px solid var(--glass-border);
  border-radius:18px;
  overflow:hidden;
  min-height:0;
}

#log {
  flex:1;
  padding:1.1rem;
  overflow-y:auto;
  display:flex;flex-direction:column;gap:0.9rem;
  min-height:0;
  scrollbar-width:thin;scrollbar-color:rgba(255,255,255,0.1) transparent;
}
#log::-webkit-scrollbar{width:4px;}
#log::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.12);border-radius:4px;}

.empty-state {
  margin:auto;text-align:center;
  color:var(--text-dim);font-size:0.85rem;font-style:italic;
  padding:1.5rem 0;
}

.row{display:flex;gap:0.55rem;align-items:flex-end;}
.row.user{flex-direction:row-reverse;}

.av {
  width:28px;height:28px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:13px;flex-shrink:0;
  background:rgba(255,255,255,0.08);
}
.row.user .av{background:rgba(245,200,66,0.18);}

.bubble {
  max-width:80%;
  padding:0.6rem 0.9rem;
  font-size:0.875rem;line-height:1.6;
  white-space:pre-wrap;word-break:break-word;
}
.row.agent .bubble {
  background:rgba(255,255,255,0.06);
  border:1px solid rgba(255,255,255,0.1);
  border-radius:6px 16px 16px 16px;
  color:var(--text);
}
.row.user .bubble {
  background:rgba(124,92,191,0.3);
  border:1px solid rgba(168,130,232,0.28);
  border-radius:16px 6px 16px 16px;
  color:#ede6ff;
  text-align:right;
}
.row.err .bubble {
  background:rgba(200,60,60,0.18);
  border:1px solid rgba(240,100,100,0.3);
  border-radius:8px;color:#ffb0b0;
}

.dots span {
  display:inline-block;width:5px;height:5px;
  background:rgba(200,190,255,0.5);border-radius:50%;
  margin:0 2px;animation:bop 1.1s ease-in-out infinite;
}
.dots span:nth-child(2){animation-delay:.2s;}
.dots span:nth-child(3){animation-delay:.4s;}
@keyframes bop{0%,80%,100%{transform:translateY(0);}40%{transform:translateY(-6px);}}

/* input row */
.input-row {
  display:flex;align-items:center;gap:0.5rem;
  padding:0.75rem 1rem;
  border-top:1px solid rgba(255,255,255,0.07);
  background:rgba(255,255,255,0.025);
}
#msg {
  flex:1;
  background:rgba(255,255,255,0.07);
  border:1px solid rgba(255,255,255,0.14);
  border-radius:11px;
  padding:0.52rem 0.9rem;
  font-size:0.9rem;color:#e8e4f8;
  outline:none;font-family:'Nunito',sans-serif;
  transition:border-color 0.2s;
}
#msg::placeholder{color:rgba(180,170,220,0.38);}
#msg:focus{border-color:rgba(245,200,66,0.42);}

#send {
  width:38px;height:38px;border-radius:11px;flex-shrink:0;
  background:linear-gradient(135deg,rgba(245,200,66,0.22),rgba(124,92,191,0.32));
  border:1px solid rgba(245,200,66,0.32);
  color:var(--gold);font-size:15px;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;transition:all 0.18s;
}
#send:hover{background:rgba(245,200,66,0.22);border-color:rgba(245,200,66,0.6);transform:scale(1.07);}
#send:disabled{opacity:0.38;cursor:not-allowed;transform:none;}

.sid-row {
  text-align:center;padding:0.35rem;
  font-size:0.68rem;color:rgba(170,160,210,0.28);
}
</style>
</head>
<body>
<canvas id="fw-canvas"></canvas>
<div class="wrap">

  <div class="header">
    <div class="castle">🏰</div>
    <h1 class="title">Disney Parks Queue Oracle</h1>
    <p class="subtitle">Real-time waits · Ride discovery · Park insights</p>
    <p class="attrib">Live data: <a href="https://queue-times.com/" target="_blank" rel="noopener">Powered by Queue-Times.com</a></p>
  </div>

  <!-- MAP -->
  <div class="map-wrap" id="mapWrap">
    <div class="map-cap">✦ Disney Parks Worldwide — hover to explore ✦</div>
    <svg id="map-svg" viewBox="0 0 960 380" preserveAspectRatio="xMidYMid meet"></svg>
    <div class="tip" id="tip"></div>
  </div>

  <!-- QUICK PILLS -->
  <div class="quick-wrap" id="quickWrap">
    <div class="quick-label">✦ Try asking ✦</div>
    <div class="pills">
      <button class="pill pill-a" data-q="Which ride has the shortest wait time at Magic Kingdom right now?">✨ Shortest wait at Magic Kingdom?</button>
      <button class="pill pill-b" data-q="What's the average wait time across all rides at Animal Kingdom right now?">✨ Animal Kingdom crowd levels?</button>
      <button class="pill pill-c" data-q="I love rollercoasters — which Disney theme park should I visit today for the best thrill rides with shortest waits?">✨ Best park for rollercoasters today?</button>
    </div>
  </div>

  <!-- CHAT -->
  <div class="chat-box">
    <div id="log">
      <div class="empty-state">Ask anything about Disney park waits, rides, or planning your visit ✨</div>
    </div>
    <div class="input-row">
      <input type="text" id="msg" placeholder="Ask about waits, rides, or plan your visit…" autocomplete="off"/>
      <button id="send" title="Send">➤</button>
    </div>
    <div class="sid-row">Session: <span id="sid">new</span></div>
  </div>

</div>

<!-- D3 for map projection -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.9.0/d3.min.js"></script>
<!-- TopoJSON -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/topojson/3.0.2/topojson.min.js"></script>

<script>
// ─── PARKS DATA ───────────────────────────────────────────────────
const PARKS = [
  {id:120,name:"Animal Kingdom",        lon:-81.5912,lat:28.3531, color:"#60d896", glow:"rgba(96,216,150,0.5)"},
  {id:121,name:"Disney Adventure World Paris",lon:2.7790, lat:48.8673, color:"#c090f0", glow:"rgba(192,144,240,0.5)"},
  {id:122,name:"Disney California Adventure",lon:-117.9195,lat:33.8059, color:"#f5c842", glow:"rgba(245,200,66,0.5)"},
  {id:123,name:"Hollywood Studios",     lon:-81.5583,lat:28.3575, color:"#f5c842", glow:"rgba(245,200,66,0.5)"},
  {id:124,name:"Magic Kingdom",         lon:-81.5812,lat:28.4177, color:"#f5c842", glow:"rgba(245,200,66,0.5)"},
  {id:125,name:"Disneyland",            lon:-117.9190,lat:33.8105, color:"#f5c842", glow:"rgba(245,200,66,0.5)"},
  {id:126,name:"Disneyland Hong Kong",  lon:114.0433,lat:22.3133, color:"#3dd6c0", glow:"rgba(61,214,192,0.5)"},
  {id:127,name:"Disneyland Park Paris", lon:2.7758, lat:48.8722, color:"#c090f0", glow:"rgba(192,144,240,0.5)"},
  {id:128,name:"Epcot",                 lon:-81.5494,lat:28.3747, color:"#f5c842", glow:"rgba(245,200,66,0.5)"},
  {id:129,name:"Shanghai Disney Resort",lon:121.6573,lat:31.1440, color:"#3dd6c0", glow:"rgba(61,214,192,0.5)"},
  {id:130,name:"Tokyo Disneyland",      lon:139.8793,lat:35.6348, color:"#ff9080", glow:"rgba(255,144,128,0.5)"},
  {id:131,name:"Tokyo DisneySea",       lon:139.8891,lat:35.6271, color:"#ff9080", glow:"rgba(255,144,128,0.5)"},
];

// Group nearby parks for cleaner rendering
const PARK_GROUPS = {
  "Walt Disney World": [120,123,124,128],
  "Disneyland Resort CA": [122,125],
  "Tokyo Disney Resort": [130,131],
  "Disneyland Paris": [121,127],
};

// ─── MAP RENDERING ────────────────────────────────────────────────
const svg = document.getElementById('map-svg');
const svgNS = 'http://www.w3.org/2000/svg';
const W = 960, H = 380;

// Natural Earth projection approximation
const projection = d3.geoNaturalEarth1()
  .scale(118)
  .translate([W/2, H/2]);

const path = d3.geoPath().projection(projection);

// Fetch world topojson and draw
fetch('https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json')
  .then(r => r.json())
  .then(world => {
    const countries = topojson.feature(world, world.objects.countries);
    const graticule = d3.geoGraticule();

    // graticule lines
    const gEl = document.createElementNS(svgNS,'path');
    gEl.setAttribute('d', path(graticule()));
    gEl.setAttribute('fill','none');
    gEl.setAttribute('stroke','rgba(150,160,220,0.1)');
    gEl.setAttribute('stroke-width','0.5');
    svg.appendChild(gEl);

    // sphere outline
    const sphere = document.createElementNS(svgNS,'path');
    sphere.setAttribute('d', path({type:'Sphere'}));
    sphere.setAttribute('fill','rgba(10,20,50,0.4)');
    sphere.setAttribute('stroke','rgba(150,160,220,0.18)');
    sphere.setAttribute('stroke-width','0.7');
    svg.insertBefore(sphere, svg.firstChild);

    // countries
    countries.features.forEach(feat => {
      const p = document.createElementNS(svgNS,'path');
      p.setAttribute('d', path(feat));
      p.setAttribute('fill','rgba(80,100,160,0.22)');
      p.setAttribute('stroke','rgba(130,150,220,0.28)');
      p.setAttribute('stroke-width','0.4');
      svg.appendChild(p);
    });

    // Park pins
    drawParks();
  })
  .catch(() => {
    // fallback — simplified continents if CDN fails
    drawFallbackMap();
    drawParks();
  });

function drawParks() {
  const tip = document.getElementById('tip');
  const mapWrap = document.getElementById('mapWrap');

  // Deduplicate: group very close parks
  const rendered = new Set();
  const clusterMap = {};
  PARKS.forEach(p => {
    for(const [gname, ids] of Object.entries(PARK_GROUPS)) {
      if(ids.includes(p.id)) { clusterMap[p.id] = gname; break; }
    }
  });

  const clusters = {};
  PARKS.forEach(p => {
    const key = clusterMap[p.id] || p.name;
    if(!clusters[key]) clusters[key] = {parks:[], color:p.color, glow:p.glow};
    clusters[key].parks.push(p);
  });

  Object.entries(clusters).forEach(([label, {parks, color, glow}]) => {
    const avgLon = parks.reduce((s,p)=>s+p.lon,0)/parks.length;
    const avgLat = parks.reduce((s,p)=>s+p.lat,0)/parks.length;
    const [px, py] = projection([avgLon, avgLat]);
    if(!px || !py) return;

    // defs for glow filter
    let defs = svg.querySelector('defs');
    if(!defs){defs=document.createElementNS(svgNS,'defs');svg.insertBefore(defs,svg.firstChild);}
    const fid = 'glow'+label.replace(/\W/g,'');
    if(!defs.querySelector('#'+fid)){
      const filt=document.createElementNS(svgNS,'filter');filt.id=fid;
      const blur=document.createElementNS(svgNS,'feGaussianBlur');
      blur.setAttribute('stdDeviation','3.5');blur.setAttribute('result','b');
      const merge=document.createElementNS(svgNS,'feMerge');
      const mn1=document.createElementNS(svgNS,'feMergeNode');mn1.setAttribute('in','b');
      const mn2=document.createElementNS(svgNS,'feMergeNode');mn2.setAttribute('in','SourceGraphic');
      merge.appendChild(mn1);merge.appendChild(mn2);
      filt.appendChild(blur);filt.appendChild(merge);defs.appendChild(filt);
    }

    const g = document.createElementNS(svgNS,'g');
    g.setAttribute('class','park-pin');
    g.style.cursor='default';

    // pulse ring
    const ring = document.createElementNS(svgNS,'circle');
    ring.setAttribute('cx',px);ring.setAttribute('cy',py);
    ring.setAttribute('r','8');
    ring.setAttribute('fill',color.replace(')',',0.18)').replace('rgb','rgba').replace('#','')); // quick alpha
    ring.setAttribute('fill', hexAlpha(color,0.18));
    ring.setAttribute('stroke',color);ring.setAttribute('stroke-width','0.8');
    ring.setAttribute('stroke-opacity','0.6');
    ring.setAttribute('class','halo');
    ring.setAttribute('filter',`url(#${fid})`);
    ring.style.transition='r 0.25s,opacity 0.25s';

    const dot = document.createElementNS(svgNS,'circle');
    dot.setAttribute('cx',px);dot.setAttribute('cy',py);
    dot.setAttribute('r','4.5');
    dot.setAttribute('fill',color);
    dot.setAttribute('class','core');
    dot.style.transition='r 0.2s';

    g.appendChild(ring);g.appendChild(dot);
    svg.appendChild(g);

    // Hover
    const parkNames = parks.map(p=>p.name).join(' & ');
    let tipTimeout;
    g.addEventListener('mouseenter', (e) => {
      ring.setAttribute('r','11');
      dot.setAttribute('r','6');
      tip.innerHTML = `<strong>${label}</strong>${parks.length>1?'<em>'+parks.map(p=>p.name).join(', ')+'</em>':''}`;
      tip.classList.add('show');
      moveTip(e);
    });
    g.addEventListener('mousemove', moveTip);
    g.addEventListener('mouseleave', () => {
      ring.setAttribute('r','8');
      dot.setAttribute('r','4.5');
      tip.classList.remove('show');
    });

    function moveTip(e) {
      const rect = mapWrap.getBoundingClientRect();
      let x = e.clientX - rect.left + 14;
      let y = e.clientY - rect.top - 14;
      const tw = 190;
      if(x + tw > rect.width - 10) x = e.clientX - rect.left - tw - 10;
      if(y < 0) y = e.clientY - rect.top + 18;
      tip.style.left = x+'px';
      tip.style.top = y+'px';
    }
  });
}

function hexAlpha(hex, a) {
  const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${a})`;
}

function drawFallbackMap() {
  const continents = [
    // N America
    "M 80,85 L110,72 L170,78 L200,100 L215,130 L210,175 L195,215 L175,250 L155,285 L135,310 L118,305 L100,275 L88,245 L78,210 L68,175 L62,140 L65,108 Z",
    // S America
    "M 150,330 L178,318 L210,325 L228,360 L225,410 L210,440 L192,448 L170,435 L155,410 L148,378 Z",
    // Europe
    "M 420,72 L465,62 L505,68 L520,88 L512,115 L490,128 L460,132 L435,120 L420,100 Z",
    // Africa
    "M 438,140 L480,132 L518,145 L532,185 L526,240 L508,285 L484,308 L455,302 L436,272 L425,230 L428,185 L432,158 Z",
    // Asia
    "M 530,58 L640,48 L740,56 L800,75 L830,100 L820,140 L790,168 L745,178 L700,172 L655,162 L608,148 L568,130 L540,108 L525,82 Z",
    // Japan
    "M 808,95 L822,88 L833,100 L828,115 L814,110 Z",
    // SE Asia
    "M 718,188 L755,180 L778,200 L770,228 L742,232 L718,215 Z",
    // Australia
    "M 742,310 L800,298 L848,312 L862,355 L848,398 L820,414 L784,408 L755,386 L738,352 Z",
  ];
  continents.forEach(d => {
    const p = document.createElementNS(svgNS,'path');
    p.setAttribute('d',d);
    p.setAttribute('fill','rgba(80,100,160,0.22)');
    p.setAttribute('stroke','rgba(130,150,220,0.28)');
    p.setAttribute('stroke-width','0.5');
    svg.appendChild(p);
  });
}

// ─── CHAT ─────────────────────────────────────────────────────────
const logEl = document.getElementById('log');
const inputEl = document.getElementById('msg');
const sendBtn = document.getElementById('send');
const sidEl = document.getElementById('sid');
const quickWrap = document.getElementById('quickWrap');
let sessionId = null;
let firstMsg = true;

document.querySelectorAll('.pill').forEach(btn => {
  btn.addEventListener('click', () => {
    inputEl.value = btn.dataset.q;
    send();
  });
});

function esc(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function appendMsg(role, html) {
  const empty = logEl.querySelector('.empty-state');
  if(empty) empty.remove();

  const row = document.createElement('div');
  row.className = 'row ' + role;

  const av = document.createElement('div');
  av.className = 'av';
  av.textContent = role==='user' ? '🧑' : role==='err' ? '⚠️' : '🏰';

  const bub = document.createElement('div');
  bub.className = 'bubble';
  bub.innerHTML = html;

  row.appendChild(av);
  row.appendChild(bub);
  logEl.appendChild(row);
  logEl.scrollTop = logEl.scrollHeight;
  return row;
}

function typing() {
  return appendMsg('agent','<div class="dots"><span></span><span></span><span></span></div>');
}

async function send() {
  const text = inputEl.value.trim();
  if(!text) return;
  inputEl.value = '';
  appendMsg('user', esc(text));
  sendBtn.disabled = true;

  if(firstMsg) {
    quickWrap.classList.add('gone');
    firstMsg = false;
  }

  const t = typing();

  try {
    const res = await fetch('/chat', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({message:text, session_id:sessionId}),
    });
    const raw = await res.text();
    let data;
    try { data = JSON.parse(raw); }
    catch {
      t.remove();
      appendMsg('err', 'Server error ('+res.status+'): '+esc(raw.slice(0,300)));
      sendBtn.disabled=false; return;
    }
    if(!res.ok) {
      t.remove();
      const msg = typeof data.detail==='string' ? data.detail : JSON.stringify(data.detail ?? data);
      appendMsg('err', esc(msg));
      sendBtn.disabled=false; return;
    }
    sessionId = data.session_id;
    sidEl.textContent = sessionId.slice(0,8)+'…';
    t.remove();
    appendMsg('agent', esc(data.response||'(empty)').replace(/\n/g,'<br>'));
  } catch(e) {
    t.remove();
    appendMsg('err', esc(String(e)));
  }
  sendBtn.disabled = false;
}

sendBtn.addEventListener('click', send);
inputEl.addEventListener('keydown', e => { if(e.key==='Enter') send(); });
</script>
<script>
// ─── GENTLE FIREWORKS ─────────────────────────────────────────────
(function(){
  const cv = document.getElementById('fw-canvas');
  const ctx = cv.getContext('2d');

  function resize(){ cv.width=innerWidth; cv.height=innerHeight; }
  resize(); window.addEventListener('resize', resize);

  // Palette: soft, jewel-toned — not too bright
  const PALETTES = [
    ['#f5c842','#ffe98a','#e8a020'],   // gold
    ['#a882e8','#c8a8ff','#7c5cbf'],   // purple
    ['#3dd6c0','#80ffe8','#1a9e8a'],   // teal
    ['#ff9080','#ffbba0','#e05040'],   // coral
    ['#80b8ff','#b0d8ff','#4888e0'],   // blue
  ];

  const shells = [];   // rising rockets
  const bursts = [];   // exploded particles

  class Shell {
    constructor() { this.reset(); }
    reset() {
      // launch strictly in left or right side strip (outer 22% of screen width each)
      const side = Math.random() < 0.5 ? 'L' : 'R';
      const sideW = innerWidth * 0.22;
      this.side = side;
      if(side === 'L') {
        this.x = 10 + Math.random() * (sideW - 10);
      } else {
        this.x = innerWidth - sideW + Math.random() * (sideW - 10);
      }
      this.y = innerHeight + 8;
      // target height: upper 15–55% of screen
      this.ty = innerHeight * (0.15 + Math.random() * 0.40);
      // very slight horizontal drift, constrained to stay on same side
      this.vx = (Math.random() - 0.5) * 0.5;
      this.vy = -(innerHeight - this.ty) / (55 + Math.random() * 25);
      this.palette = PALETTES[Math.floor(Math.random() * PALETTES.length)];
      this.trail = [];
      this.done = false;
    }
    update() {
      this.trail.push({x:this.x, y:this.y});
      if(this.trail.length > 10) this.trail.shift();
      this.x += this.vx;
      this.y += this.vy;
      if(this.y <= this.ty) { this.done = true; explode(this); }
    }
    draw() {
      for(let i=0;i<this.trail.length;i++){
        const t = this.trail[i];
        const a = (i/this.trail.length)*0.55;
        ctx.beginPath();
        ctx.arc(t.x, t.y, 1.5*(i/this.trail.length), 0, Math.PI*2);
        ctx.fillStyle = `rgba(255,240,180,${a})`;
        ctx.fill();
      }
    }
  }

  function explode(shell) {
    const count = 55 + Math.floor(Math.random() * 30);
    const col = shell.palette;
    const sideW = innerWidth * 0.22;
    const maxX = shell.side === 'L' ? sideW * 1.5 : innerWidth;
    const minX = shell.side === 'L' ? 0 : innerWidth - sideW * 1.5;
    for(let i=0;i<count;i++){
      const angle = (i/count) * Math.PI * 2;
      const speed = 1.0 + Math.random() * 2.0;
      bursts.push({
        x: shell.x, y: shell.y,
        vx: Math.cos(angle)*speed,
        vy: Math.sin(angle)*speed,
        life: 1,
        decay: 0.013 + Math.random()*0.008,
        color: col[Math.floor(Math.random()*col.length)],
        r: 1.5 + Math.random()*1.5,
        gravity: 0.03 + Math.random()*0.02,
        tail: [],
        minX, maxX,
      });
    }
    // sparkle offshoots
    for(let i=0;i<8;i++){
      const angle = Math.random()*Math.PI*2;
      const speed = 2.5 + Math.random()*2;
      bursts.push({
        x: shell.x, y: shell.y,
        vx: Math.cos(angle)*speed,
        vy: Math.sin(angle)*speed,
        life: 1,
        decay: 0.022 + Math.random()*0.01,
        color: '#ffffff',
        r: 1,
        gravity: 0.025,
        tail: [],
        minX, maxX,
      });
    }
  }

  // Spawn a shell every 1.8–3.5 seconds — calm cadence
  let lastSpawn = 0;
  let nextInterval = 2200;

  function loop(ts) {
    requestAnimationFrame(loop);

    // Soft fade trail — semi-transparent clear
    ctx.fillStyle = 'rgba(12,20,40,0.22)';
    ctx.fillRect(0,0,cv.width,cv.height);

    // Spawn
    if(ts - lastSpawn > nextInterval) {
      shells.push(new Shell());
      lastSpawn = ts;
      nextInterval = 1800 + Math.random()*1700;
    }

    // Update & draw shells
    for(let i=shells.length-1;i>=0;i--){
      shells[i].update();
      shells[i].draw();
      if(shells[i].done) shells.splice(i,1);
    }

    // Update & draw burst particles
    for(let i=bursts.length-1;i>=0;i--){
      const p = bursts[i];
      p.tail.push({x:p.x,y:p.y});
      if(p.tail.length>5) p.tail.shift();
      p.x += p.vx;
      p.y += p.vy;
      p.vy += p.gravity;
      p.vx *= 0.985;
      // clamp to side strip — bounce/kill if crossing center
      if(p.minX !== undefined && (p.x < p.minX || p.x > p.maxX)) {
        p.life = 0;
      }
      p.life -= p.decay;
      if(p.life <= 0){ bursts.splice(i,1); continue; }

      // tail
      for(let t=0;t<p.tail.length;t++){
        const ta = (t/p.tail.length)*p.life*0.35;
        ctx.beginPath();
        ctx.arc(p.tail[t].x, p.tail[t].y, p.r*0.6, 0, Math.PI*2);
        ctx.fillStyle = p.color.replace(')',`,${ta})`).replace('#',
          (s)=>{const r=parseInt(s.slice(1,3),16),g=parseInt(s.slice(3,5),16),b=parseInt(s.slice(5,7),16);
                return `rgba(${r},${g},${b},`});
        // simpler:
        ctx.globalAlpha = ta;
        ctx.fillStyle = p.color;
        ctx.fill();
      }

      ctx.globalAlpha = p.life * 0.85;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI*2);
      ctx.fillStyle = p.color;
      ctx.fill();
      ctx.globalAlpha = 1;

      if(bursts.length > 1200) bursts.splice(i,1);
    }
  }

  // Kick off with a first burst after 0.8s so it feels alive immediately
  setTimeout(()=>{ shells.push(new Shell()); lastSpawn=performance.now(); }, 800);
  requestAnimationFrame(loop);
})();
</script>
